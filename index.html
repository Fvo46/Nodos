<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Integradora — Tecnologías y sociedad</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Architects Daughter', cursive;
        }

        /* FONDO OPTIMIZADO: Tono amarillo sutil, líneas grises y margen izquierdo rojo */
        #network-container {
            width: 100%;
            height: 100%;
            background-color: #fff8e7; /* Amarillo sutil de cuaderno/fichero */
            background-image: 
                linear-gradient(90deg, transparent 79px, #ff4d4d 79px, #ff4d4d 81px, transparent 81px), /* Margen vertical rojo */
                linear-gradient(#e2dfd2 1px, transparent 1px); /* Líneas horizontales */
            background-size: 100% 100%, 100% 28px;
            position: relative;
        }

        /* Interfaz de usuario superior fija */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 100px; /* Desplazado para no tapar el margen rojo */
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            font-size: 28px;
            color: #0a2f60;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .counter-badge {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #1a6bb5;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #0a2f60;
            width: fit-content;
            pointer-events: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #reset-btn {
            background: #fff;
            border: 2px solid #c97b0a;
            color: #6b3800;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Architects Daughter', cursive;
            font-weight: bold;
            font-size: 14px;
            pointer-events: auto;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            align-self: flex-start;
        }

        #reset-btn:hover {
            background: #fde8c8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Tecnologías y sociedad</h1>
        <div class="counter-badge" id="counter">Nodos descubiertos: 1 / 44</div>
        <button id="reset-btn" onclick="initNetwork()">Reiniciar Red</button>
    </div>

    <div id="network-container"></div>

    <script>
        // --- BASE DE DATOS MAESTRA DE NODOS (1 al 44) ---
        const rawNodes = [
            { id: 1, label: "Tecnologia", group: "orange" },
            { id: 2, label: "Recurso educativo indispensable", group: "orange" },
            { id: 3, label: "TICS", group: "orange" },
            { id: 4, label: "Tecnología de la comunicación", group: "orange" },
            { id: 5, label: "Red", group: "orange" },
            { id: 6, label: "Motivar, aprendizaje.\nDewey", group: "orange" },
            { id: 7, label: "● Indagación\n● Comunicación\n● Construcción\n● Expresión", group: "orange" },
            { id: 8, label: "Visión\nMultifacética", group: "orange" },
            { id: 9, label: "Sueño tecnocrático (la tecnología presentará límites)", group: "orange" },
            { id: 10, label: "Tecnología como:\n● Panacea\n● Herramienta\n● Herramienta no neutral", group: "empty" },
            { id: 11, label: "Instrumental vs. Relacional", group: "orange" },
            { id: 12, label: "Relación Bidireccional", group: "orange" },
            { id: 13, label: "Líneas de desarrollo inconcebibles", group: "orange" },
            { id: 14, label: "Promesas de riesgo,\nriesgos promisorios.", group: "orange" },
            { id: 15, label: "Espacio público", group: "orange" },
            { id: 16, label: "Ciberespacio", group: "orange" },
            { id: 17, label: "Inteligencia\nen red", group: "green" },
            { id: 18, label: "Acceso =\nOportunidad", group: "green" },
            { id: 19, label: "Aprendizaje activo", group: "blue" },
            { id: 20, label: "Democracia particular", group: "purple" },
            { id: 21, label: "Saber no centralizado", group: "purple" },
            { id: 22, label: "Conexión = cuidado", group: "purple" },
            { id: 23, label: "Elogio de lo humano", group: "purple" },
            { id: 24, label: "Vigilancia constante", group: "green" },
            { id: 25, label: "Interconexión", group: "green" },
            { id: 26, label: "No reemplaza ≠ Se integra críticamente", group: "blue" },
            { id: 27, label: "Uso estratégico", group: "outline" },
            { id: 28, label: "Apoyos", group: "outline" },
            { id: 29, label: "Inteligencia\nextensible", group: "green" },
            { id: 30, label: "Suplementar\ncapacidades", group: "green" },
            { id: 31, label: "Vivirmundo\n= otra mentalidad", group: "purple" },
            { id: 32, label: "Tecnológicamente", group: "green" },
            { id: 33, label: "Socialmente", group: "green" },
            { id: 34, label: "● Conocimiento\n● Memoria\n● Procesamiento", group: "green" },
            { id: 35, label: "Aprendizaje\nColaborativo\nCooperativo", group: "blue" },
            { id: 36, label: "Construcción\ndinámica del aula", group: "blue" },
            { id: 37, label: "Estudiante autónomo\nDocente = acompañante cognitivo", group: "blue" },
            { id: 38, label: "Estudiante ≠ Pasajero", group: "purple" },
            { id: 39, label: "Conductor", group: "purple" },
            { id: 40, label: "Personificación del aprendizaje", group: "blue" },
            { id: 41, label: "Aula invertida\nEstructura extra escolar", group: "blue" },
            { id: 42, label: "Tiempo áulico resignificado", group: "blue" },
            { id: 43, label: "Integración de saberes > fragmentación", group: "purple" },
            { id: 44, label: "Ubicuidad temporal\nUbicuidad en sentido práctico", group: "green" }
        ];

        // --- BASE DE DATOS MAESTRA DE CONEXIONES ---
        const rawEdges = [
            { from: 1, to: 2, arrows: "to" },
            { from: 1, to: 3, arrows: "to" },
            { from: 3, to: 4, arrows: "to" },
            { from: 4, to: 5, arrows: "to" },
            { from: 1, to: 6, arrows: "to" },
            { from: 5, to: 15, arrows: "to" },
            { from: 15, to: 16, arrows: "to" },
            { from: 16, to: 17, arrows: "to" },
            { from: 17, to: 18, arrows: "to" },
            { from: 18, to: 19, arrows: "to" },
            { from: 18, to: 21, arrows: "to" },
            { from: 5, to: 26, arrows: "to" },
            { from: 26, to: 27, arrows: "to" },
            { from: 27, to: 28, arrows: "to" },
            { from: 28, to: 30, arrows: "to" },
            { from: 17, to: 24, arrows: "to" },
            { from: 24, to: 25, arrows: "to" },
            { from: 25, to: 29, arrows: "to" },
            { from: 5, to: 22, arrows: "to" },
            { from: 22, to: 23, arrows: "to" },
            { from: 30, to: 31, arrows: "to" },
            { from: 30, to: 32, arrows: "to" },
            { from: 30, to: 33, arrows: "to" },
            { from: 32, to: 34, arrows: "to" },
            { from: 33, to: 35, arrows: "to" },
            { from: 9, to: 14, arrows: "to" },
            { from: 11, to: 12, arrows: "to" },
            { from: 11, to: 13, arrows: "to" },
            { from: 8, to: 18, arrows: "to" },
            { from: 36, to: 37, arrows: "to" },
            { from: 36, to: 41, arrows: "to" },
            { from: 38, to: 39, arrows: "to" },
            { from: 41, to: 42, arrows: "to" },
            { from: 42, to: 44, arrows: "to" },
            { from: 42, to: 43, arrows: "to" },
            { from: 21, to: 36, arrows: "to" },
            { from: 19, to: 36, arrows: "to" },
            { from: 29, to: 36, arrows: "to" },
            { from: 1, to: 9, arrows: "to" },
            { from: 9, to: 10, arrows: "to" },
            { from: 10, to: 11, arrows: "to" },

            // Conexiones invisibles (Nodos flotantes por proximidad conceptual)
            { from: 6, to: 7, arrows: "", color: { opacity: 0 } },
            { from: 17, to: 20, arrows: "", color: { opacity: 0 } },
            { from: 20, to: 29, arrows: "", color: { opacity: 0 } },
            { from: 37, to: 38, arrows: "", color: { opacity: 0 } },
            { from: 37, to: 40, arrows: "", color: { opacity: 0 } }
        ];

        let network = null;
        let visibleNodeIds = new Set();
        let nodesDataSet = null;
        let edgesDataSet = null;

        function initNetwork() {
            visibleNodeIds = new Set([1]);

            const initialNodes = rawNodes.filter(n => visibleNodeIds.has(n.id));
            const initialEdges = [];

            nodesDataSet = new vis.DataSet(initialNodes);
            edgesDataSet = new vis.DataSet(initialEdges);

            const container = document.getElementById('network-container');
            const data = { nodes: nodesDataSet, edges: edgesDataSet };

            const options = {
                nodes: {
                    shape: 'box',
                    margin: { top: 6, bottom: 6, left: 10, right: 10 }, 
                    font: {
                        face: 'Architects Daughter',
                        size: 19, // Ajustado para rellenar el cuadro
                        multi: 'md'
                    },
                    borderWidth: 2,
                    borderWidthSelected: 4,
                    shadow: {
                        enabled: true,
                        color: 'rgba(0,0,0,0.06)',
                        size: 3,
                        x: 2,
                        y: 2
                    }
                },
                edges: {
                    color: { color: '#2a4a8a', highlight: '#1a6bb5', hover: '#1a6bb5' },
                    smooth: { type: 'quadraticBezier', roundness: 0.3 },
                    width: 2
                },
                groups: {
                    orange: { background: '#FDE8C8', border: '#C97B0A', font: { color: '#6B3800' }, shapeProperties: { borderRadius: 6 } },
                    blue: { background: '#C8DDF5', border: '#1A6BB5', font: { color: '#0A2F60' }, shapeProperties: { borderRadius: 6 } },
                    green: { background: '#C8E6C4', border: '#2E7A2C', font: { color: '#133D12' }, shapeProperties: { borderRadius: 6 } },
                    purple: { background: '#DDD5F0', border: '#6035A8', font: { color: '#301768' }, shapeProperties: { borderRadius: 6 } },
                    outline: { background: 'rgba(255,255,255,0.92)', border: '#1A6BB5', font: { color: '#0A2F60' }, shapeProperties: { borderRadius: 6 } },
                    empty: { background: 'rgba(255,255,255,0.92)', border: '#888888', font: { color: '#333333' }, shapeProperties: { borderRadius: 6 } }
                },
                interaction: { hover: true, dragNodes: true, zoomView: true, dragView: true },
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -2000,
                        centralGravity: 0.15,
                        springLength: 130,
                        springConstant: 0.05,
                        damping: 0.1,
                        avoidOverlap: 1
                    },
                    stabilization: {
                        enabled: true,
                        iterations: 150,
                        updateInterval: 25
                    }
                }
            };

            network = new vis.Network(container, data, options);
            updateCounter();

            // EVENTO CLAVE: Detiene la simulación física cuando los nodos se acomodan para que queden estáticos
            network.on("stabilizationIterationsDone", function () {
                network.setOptions({ physics: false });
            });

            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const clickedNodeId = params.nodes[0];
                    revealNeighbors(clickedNodeId);
                }
            });
        }

        function revealNeighbors(nodeId) {
            let changesMade = false;

            // Volvemos a encender las físicas temporalmente para que el nuevo nodo encuentre su lugar ideal sin colisionar
            network.setOptions({ physics: { enabled: true } });

            rawEdges.forEach(edge => {
                let targetId = null;
                if (edge.from === nodeId) targetId = edge.to;
                else if (edge.to === nodeId) targetId = edge.from;

                if (targetId && !visibleNodeIds.has(targetId)) {
                    visibleNodeIds.add(targetId);
                    const nodeData = rawNodes.find(n => n.id === targetId);
                    if (nodeData) {
                        nodesDataSet.add(nodeData);
                        changesMade = true;
                    }
                }
            });

            if (changesMade) {
                rawEdges.forEach(edge => {
                    if (visibleNodeIds.has(edge.from) && visibleNodeIds.has(edge.to)) {
                        if (!edgesDataSet.get({ filter: e => (e.from === edge.from && e.to === edge.to) }).length) {
                            edgesDataSet.add(edge);
                        }
                    }
                });
                updateCounter();
                
                // Forzar una breve re-estabilización para los nuevos nodos y luego congelar de nuevo
                network.stabilize();
            } else {
                // Si no hay nodos nuevos que mostrar, apagamos la física de inmediato
                network.setOptions({ physics: false });
            }
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `Nodos descubiertos: ${visibleNodeIds.size} / 44`;
        }

        window.onload = () => { initNetwork(); };
    </script>
</body>
</html>
