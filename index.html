<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tecnologías y sociedad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet">
  <style>
    :root {
      --chalk: rgba(255,255,255,0.07);
      --ink: #e8f0e8;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Kalam", cursive;
      font-weight: 700;
      color: var(--ink);
      background-color: #ffffff;
      
    }

    .page { position: relative; width: 100%; height: 100%; }

    h1 {
      position: fixed;
      z-index: 4;
      top: 22px;
      left: clamp(88px, 7vw, 132px);
      margin: 0;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
      color: #d4e8d4;
      text-decoration: underline;
      text-decoration-thickness: 4px;
      text-underline-offset: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    h1.hidden { opacity: 0; }

    #network { width: 100%; height: 100%; touch-action: none; }

    .reset {
      position: fixed;
      z-index: 5;
      top: 18px;
      right: 18px;
      min-height: 42px;
      padding: 8px 14px;
      border: 2px solid rgba(200,230,200,0.5);
      border-radius: 8px;
      background: rgba(42,61,42,0.88);
      color: #d4e8d4;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      font: 700 20px/1 "Kalam", cursive;
      cursor: pointer;
    }

    .reset:hover { background: rgba(60,85,60,0.95); }

    .counter {
      position: fixed;
      z-index: 4;
      left: clamp(88px, 7vw, 132px);
      bottom: 16px;
      padding: 4px 10px;
      border: 2px solid rgba(200,230,200,0.35);
      border-radius: 8px;
      background: rgba(42,61,42,0.82);
      color: #d4e8d4;
      font-size: 18px;
      line-height: 1.1;
      user-select: none;
    }

    @media (max-width: 700px) {
      h1 {
        top: 14px;
        left: 52px;
        max-width: calc(100vw - 140px);
        font-size: 1.6rem;
        line-height: 1.08;
      }

      .reset {
        top: 10px;
        right: 10px;
        min-height: 44px;
        padding: 10px 14px;
        font-size: 18px;
      }

      .counter {
        left: 52px;
        bottom: 10px;
        font-size: 15px;
        padding: 5px 10px;
      }

      .legend-wrap {
        bottom: 10px;
        right: 10px;
      }

      .legend-toggle {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .legend-box {
        min-width: 190px;
        padding: 12px 14px;
      }

      .legend-item {
        font-size: 15px;
        gap: 8px;
      }

      .legend-dot {
        width: 20px;
        height: 20px;
      }
    }

    /* ── Legend ── */
    .legend-wrap {
      position: fixed;
      z-index: 6;
      bottom: 16px;
      right: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .legend-toggle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(200,230,200,0.5);
      background: rgba(42,61,42,0.88);
      color: #d4e8d4;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      transition: background 0.2s;
      font-family: "Kalam", cursive;
    }
    .legend-toggle:hover { background: rgba(60,85,60,0.95); }

    .legend-box {
      display: none;
      flex-direction: column;
      gap: 8px;
      background: rgba(30,46,30,0.93);
      border: 1.5px solid rgba(200,230,200,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      min-width: 220px;
    }
    .legend-box.open { display: flex; }

    .legend-title {
      font-size: 14px;
      color: rgba(212,232,212,0.7);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
      text-transform: uppercase;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      color: #d4e8d4;
    }

    .legend-dot {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 2px solid;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Tecnologías y sociedad</h1>
    <button class="reset" type="button" id="resetButton" aria-label="Restablecer red">↺ Restablecer</button>
    <div id="network" aria-label="Mapa conceptual interactivo"></div>
    <div class="counter" id="counter">1 / 44</div>

    <div class="legend-wrap">
      <div class="legend-box" id="legendBox">
        <div class="legend-title">Referencias</div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#FDE8C8;border-color:#C97B0A"></div>
          Riesgos y promesas
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#C8E6C4;border-color:#2E7A2C"></div>
          Aprendizaje Ubicuo
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#C8DDF5;border-color:#1A6BB5"></div>
          Aula invertida
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#DDD5F0;border-color:#6035A8"></div>
          Pulgarcita
        </div>
      </div>
      <button class="legend-toggle" id="legendToggle" aria-label="Mostrar/ocultar leyenda">🎨</button>
    </div>
  </main>

  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script>
    const nodeStyles = {
      orange: {
        color: { background: "#FDE8C8", border: "#C97B0A", highlight: { background: "#FDE8C8", border: "#C97B0A" } },
        font: { color: "#6B3800" }
      },
      blue: {
        color: { background: "#C8DDF5", border: "#1A6BB5", highlight: { background: "#C8DDF5", border: "#1A6BB5" } },
        font: { color: "#0A2F60" }
      },
      green: {
        color: { background: "#C8E6C4", border: "#2E7A2C", highlight: { background: "#C8E6C4", border: "#2E7A2C" } },
        font: { color: "#133D12" }
      },
      purple: {
        color: { background: "#DDD5F0", border: "#6035A8", highlight: { background: "#DDD5F0", border: "#6035A8" } },
        font: { color: "#301768" }
      },
      outline: {
        color: { background: "rgba(255,255,255,0.95)", border: "#1A6BB5", highlight: { background: "#FFFFFF", border: "#1A6BB5" } },
        font: { color: "#0A2F60" }
      },
      empty: {
        color: { background: "rgba(255,255,255,0.95)", border: "#888888", highlight: { background: "#FFFFFF", border: "#888888" } },
        font: { color: "#333333" }
      }
    };

    const allNodes = [
      { id: 1, label: "Tecnología", group: "orange", level: 0, font: { size: 34 }, widthConstraint: { minimum: 160, maximum: 400 }, heightConstraint: { minimum: 64 } },
      { id: 2, label: "Recurso educativo indispensable", group: "orange", level: 1 },
      { id: 3, label: "TICS", group: "orange", level: 1 },
      { id: 4, label: "Tecnología de la comunicación", group: "orange", level: 2 },
      { id: 5, label: "Red", group: "orange", level: 3 },
      { id: 6, label: "Motivar, aprendizaje.\nDewey", group: "orange", level: 1 },
      { id: 7, label: "● Indagación\n● Comunicación\n● Construcción\n● Ex:presión", group: "orange", level: 2 },
      { id: 8, label: "Visión\nMultifacética", group: "orange", level: 4 },
      { id: 9, label: "Sueño tecnocrático (la tecnología presentará límites)", group: "orange", level: 1 },
      { id: 10, label: "Tecnología como:\n● Panacea\n● Herramienta\n● Herramienta no neutral", group: "empty", level: 2 },
      { id: 11, label: "Instrumental vs. Relacional", group: "orange", level: 3 },
      { id: 12, label: "Relación\nBidireccional", group: "orange", level: 4 },
      { id: 13, label: "Líneas de desarrollo inconcebibles", group: "orange", level: 3 },
      { id: 14, label: "Promesas de riesgo,\nriesgos promisorios.", group: "orange", level: 2 },
      { id: 15, label: "Espacio público", group: "orange", level: 4 },
      { id: 16, label: "Ciberespacio", group: "orange", level: 5 },
      { id: 17, label: "Inteligencia\nen red", group: "green", level: 6 },
      { id: 18, label: "Acceso =\nOportunidad", group: "green", level: 7 },
      { id: 19, label: "Aprendizaje activo", group: "blue", level: 8 },
      { id: 20, label: "Democracia particular", group: "purple", level: 7 },
      { id: 21, label: "Saber no centralizado", group: "purple", level: 8 },
      { id: 22, label: "Conexión = cuidado", group: "purple", level: 6 },
      { id: 23, label: "Elogio de lo humano", group: "purple", level: 7 },
      { id: 24, label: "Vigilancia constante", group: "green", level: 7 },
      { id: 25, label: "Interconexión", group: "green", level: 8 },
      { id: 26, label: "No reemplaza ≠ Se integra críticamente", group: "blue", level: 4 },
      { id: 27, label: "Uso estratégico", group: "outline", level: 5 },
      { id: 28, label: "Apoyos", group: "outline", level: 6 },
      { id: 29, label: "Inteligencia\nextensible", group: "green", level: 9 },
      { id: 30, label: "Suplementar\ncapacidades", group: "green", level: 9 },
      { id: 31, label: "Vivir en otro mundo\n= otra mentalidad", group: "purple", level: 10 },
      { id: 32, label: "Tecnológicamente", group: "green", level: 10 },
      { id: 33, label: "Socialmente", group: "green", level: 10 },
      { id: 34, label: "● Conocimiento\n● Memoria\n● Procesamiento", group: "green", level: 11 },
      { id: 35, label: "Aprendizaje\nColaborativo\nCooperativo", group: "blue", level: 11 },
      { id: 36, label: "Construcción\ndinámica del aula", group: "blue", level: 10 },
      { id: 37, label: "Estudiante autónomo\nDocente = acompañante cognitivo", group: "blue", level: 11 },
      { id: 38, label: "Estudiante ≠ Pasajero", group: "purple", level: 12 },
      { id: 39, label: "Conductor", group: "purple", level: 13 },
      { id: 40, label: "Personificación del aprendizaje", group: "blue", level: 12 },
      { id: 41, label: "Aula invertida\nEstructura extra escolar", group: "blue", level: 11 },
      { id: 42, label: "Tiempo áulico resignificado", group: "blue", level: 12 },
      { id: 43, label: "Integración de saberes > fragmentación", group: "purple", level: 13 },
      { id: 44, label: "Ubicuidad temporal\nUbicuidad en sentido práctico", group: "green", level: 13 }
    ];

    const invisible = { color: { opacity: 0 }, arrows: "", smooth: { enabled: true, type: "dynamic" } };

    const allEdges = [
      // ID1 → 2, 3, 6, 9
      { from: 1, to: 2, arrows: "to" },
      { from: 1, to: 3, arrows: "to" },
      { from: 1, to: 6, arrows: "to" },
      { from: 1, to: 9, arrows: "to" },
      // ID2 → 26
      { from: 2, to: 26, arrows: "to" },
      // ID3 → 4
      { from: 3, to: 4, arrows: "to" },
      // ID4 → 5
      { from: 4, to: 5, arrows: "to" },
      // ID5 → 16, 22
      { from: 5, to: 16, arrows: "to" },
      { from: 16, to: 22, arrows: "to" },
      // ID6 → 7 (invisible)
      { from: 6, to: 7, arrows: "to" },
      // ID7 → 8
      { from: 7, to: 8, arrows: "to" },
      // ID8 → 18
      { from: 8, to: 18, arrows: "to" },
      // ID9 → 10, 14
      { from: 9, to: 10, arrows: "to" },
      { from: 9, to: 14, arrows: "to" },
      // ID10 → 11, 13
      { from: 10, to: 11, arrows: "to" },
      { from: 10, to: 13, arrows: "to" },
      // ID11 → 12
      { from: 11, to: 12, arrows: "to" },
      // ID16 → 15, 17 (invisible)
      { from: 16, to: 15, arrows: "to" },
      { from: 16, to: 17, arrows: "to" },
      // ID17 → 20, 24
      { from: 17, to: 20, arrows: "to" },
      { from: 17, to: 24, arrows: "to" },
      // ID18 → 19, 21
      { from: 18, to: 19, arrows: "to" },
      { from: 18, to: 21, arrows: "to" },
      // ID19 → 36
      { from: 19, to: 36, arrows: "to" },
      // ID22 → 23
      { from: 22, to: 23, arrows: "to" },
      // ID24 → 25
      { from: 24, to: 25, arrows: "to" },
      // ID25 → 29
      { from: 25, to: 29, arrows: "to" },
      // ID26 → 27 (invisible)
      { from: 26, to: 27, arrows: "to" },
      // ID27 → 28
      { from: 27, to: 28, arrows: "to" },
      // ID28 → 30
      { from: 32, to: 30, arrows: "to" },
      // ID29 → 32, 33
      { from: 29, to: 32, arrows: "to" },
      { from: 29, to: 33, arrows: "to" },
      // ID30 → 31 + flecha decorativa hacia 28
      { from: 30, to: 31, arrows: "to" },
      { from: 30, to: 28, arrows: "to", decorative: true },
      // ID32 → 34
      { from: 32, to: 34, arrows: "to" },
      // ID33 → 35
      { from: 33, to: 35, arrows: "to" },
      // ID36 → 41, 37
      { from: 36, to: 41, arrows: "to" },
      { from: 36, to: 37, arrows: "to" },
      // ID37 → 38, 40
      { from: 37, to: 38, arrows: "to" },
      { from: 37, to: 40, arrows: "to" },
      // ID38 → 39
      { from: 38, to: 39, arrows: "to" },
      // ID41 → 42
      { from: 41, to: 42, arrows: "to" },
      // ID42 → 43, 44
      { from: 42, to: 43, arrows: "to" },
      { from: 42, to: 44, arrows: "to" }
    ].map(function(edge, index) {
      return Object.assign({
        id: "e" + (index + 1),
        width: edge.color && edge.color.opacity === 0 ? 1 : 2.2,
        color: edge.color || { color: "#2a4a8a", highlight: "#143b75", hover: "#143b75" }
      }, edge);
    });

    const visibleIds = new Set();
    const expandedIds = new Set();
    const finalPositions = new Map();
    const counter = document.getElementById("counter");
    const container = document.getElementById("network");

    // Ajustes puntuales para futuras correcciones. Ejemplo:
    // 32: { x: 40, y: -20 }
    const positionAdjustments = {
      9:  { x: -80, y: -330 },
      11: { x: 120, y: 0 },
      12: { x: 120, y: 0 },
      42: { x: 120, y: 0 },
      43: { x: 120, y: 0 },
      44: { x: 120, y: 0 },
      18: { x: -46, y: 0 },
      31: { x: 0,   y: -110 }
    };

    const sharedOptions = {
      autoResize: true,
      groups: nodeStyles,
      layout: {
        hierarchical: {
          enabled: true,
          direction: "LR",
          sortMethod: "directed",
          levelSeparation: 230,
          nodeSpacing: 230,
          treeSpacing: 320,
          blockShifting: true,
          edgeMinimization: true,
          parentCentralization: false
        }
      },
      interaction: {
        hover: true,
        tooltipDelay: 120,
        dragNodes: false,
        dragView: true,
        zoomView: true,
        multiselect: false
      },
      nodes: {
        shape: "box",
        borderWidth: 2.4,
        borderWidthSelected: 4,
        margin: { top: 4, right: 7, bottom: 4, left: 7 },
        widthConstraint: { minimum: 82, maximum: 330 },
        heightConstraint: { minimum: 42 },
        chosen: {
          node: function(values) {
            values.borderWidth = 4;
            values.shadow = true;
            values.shadowSize = 18;
            values.shadowX = 0;
            values.shadowY = 0;
          },
          label: function(values) { values.mod = "bold"; }
        },
        font: {
          face: "Kalam",
          size: 24,
          bold: { face: "Kalam", size: 24, mod: "bold" },
          multi: true,
          vadjust: 0
        },
        shadow: { enabled: false, color: "rgba(0,0,0,0.12)", size: 10, x: 0, y: 2 }
      },
      edges: {
        arrows: { to: { enabled: true, scaleFactor: 0.8, type: "arrow" } },
        selectionWidth: 2,
        hoverWidth: 2,
        smooth: { enabled: true, type: "cubicBezier", forceDirection: "horizontal", roundness: 0.35 },
        physics: true
      },
      physics: {
        enabled: true,
        solver: "hierarchicalRepulsion",
        hierarchicalRepulsion: {
          centralGravity: 0,
          springLength: 180,
          springConstant: 0.018,
          nodeDistance: 260,
          damping: 0.58,
          avoidOverlap: 1
        },
        stabilization: { enabled: true, iterations: 500, updateInterval: 20, fit: false },
        timestep: 0.45,
        adaptiveTimestep: true
      }
    };

    const fixedOptions = Object.assign({}, sharedOptions, {
      layout: { hierarchical: false },
      physics: { enabled: false },
      edges: Object.assign({}, sharedOptions.edges, { physics: false })
    });

    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();
    const network = new vis.Network(container, { nodes: nodes, edges: edges }, fixedOptions);

    function nodeWithStyle(node) {
      return Object.assign({}, node, {
        hidden: false,
        title: node.label.replaceAll("\n", " ")
      });
    }

    function nodeAtFinalPosition(node) {
      const position = finalPositions.get(node.id) || { x: 0, y: 0 };
      const adjustment = positionAdjustments[node.id] || { x: 0, y: 0 };
      return Object.assign(nodeWithStyle(node), {
        x: position.x + adjustment.x,
        y: position.y + adjustment.y,
        fixed: { x: true, y: true },
        opacity: 0
      });
    }

    function connectedVisibleEdges() {
      return allEdges.filter(function(edge) {
        return visibleIds.has(edge.from) && visibleIds.has(edge.to);
      });
    }

    function refreshCounter() {
      counter.textContent = visibleIds.size + " / " + allNodes.length;
    }

    function fitVisible(animated) {
      network.fit({
        nodes: Array.from(visibleIds),
        animation: animated ? { duration: 650, easingFunction: "easeInOutQuad" } : false
      });
    }

    function fadeNodeIn(id) {
      const steps = 10;
      let step = 0;
      const tick = function() {
        step += 1;
        nodes.update({ id: id, opacity: step / steps });
        if (step < steps) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }

    function revealNode(id) {
      if (visibleIds.has(id)) return;
      const node = allNodes.find(function(item) { return item.id === id; });
      if (!node) return;
      visibleIds.add(id);
      nodes.add(nodeAtFinalPosition(node));
      fadeNodeIn(id);
    }

    function revealChildren(parentId) {
      const children = allEdges
        .filter(function(edge) { return edge.from === parentId && !edge.decorative; })
        .map(function(edge) { return edge.to; })
        .filter(function(id) { return !visibleIds.has(id); });

      if (!children.length) return;

      children.forEach(revealNode);
      edges.update(connectedVisibleEdges());
      expandedIds.add(parentId);
      nodes.update({
        id: parentId,
        borderWidth: 4,
        shadow: { enabled: true, color: "rgba(20,59,117,0.28)", size: 18, x: 0, y: 0 }
      });
      refreshCounter();

      // Hide title on first expansion
      document.querySelector("h1").classList.add("hidden");
    }

    function resetGraph() {
      nodes.clear();
      edges.clear();
      visibleIds.clear();
      expandedIds.clear();
      revealNode(1);
      refreshCounter();
      document.querySelector("h1").classList.remove("hidden");
      setTimeout(function() { fitVisible(false); }, 80);
    }

    function applyBranchAwareLayout(rawPositions) {
      const nodeById = new Map(allNodes.map(function(node) { return [node.id, node]; }));
      const incoming = new Map(allNodes.map(function(node) { return [node.id, []]; }));
      allEdges.forEach(function(edge) {
        if (!incoming.has(edge.to)) incoming.set(edge.to, []);
        incoming.get(edge.to).push(edge.from);
      });

      const primaryParent = new Map();
      incoming.forEach(function(parents, childId) {
        if (!parents.length) return;
        const childPosition = rawPositions[childId] || { x: 0, y: 0 };
        const bestParent = parents.slice().sort(function(a, b) {
          const ay = rawPositions[a] ? rawPositions[a].y : 0;
          const by = rawPositions[b] ? rawPositions[b].y : 0;
          return Math.abs(ay - childPosition.y) - Math.abs(by - childPosition.y);
        })[0];
        primaryParent.set(childId, bestParent);
      });

      const treeChildren = new Map(allNodes.map(function(node) { return [node.id, []]; }));
      allEdges.forEach(function(edge) {
        if (primaryParent.get(edge.to) === edge.from) {
          treeChildren.get(edge.from).push(edge.to);
        }
      });

      const order = new Map(allNodes.map(function(node, index) { return [node.id, index]; }));
      treeChildren.forEach(function(children) {
        children.sort(function(a, b) { return order.get(a) - order.get(b); });
      });

      const yById = new Map();
      const visited = new Set();
      let nextY = 0;
      const rowGap = 145;
      const levelGap = 290;

      function placeSubtree(id) {
        if (visited.has(id)) return yById.get(id);
        visited.add(id);
        const children = treeChildren.get(id) || [];
        if (!children.length) {
          const y = nextY;
          yById.set(id, y);
          nextY += rowGap;
          return y;
        }

        const childYs = children.map(placeSubtree);
        const y = childYs.reduce(function(sum, value) { return sum + value; }, 0) / childYs.length;
        yById.set(id, y);
        return y;
      }

      placeSubtree(1);
      allNodes.forEach(function(node) {
        if (!visited.has(node.id)) placeSubtree(node.id);
      });

      const rootY = yById.get(1) || 0;
      const laidOut = {};
      allNodes.forEach(function(node) {
        const raw = rawPositions[node.id] || { x: node.level * levelGap, y: 0 };
        laidOut[node.id] = {
          x: node.level * levelGap,
          y: (yById.get(node.id) || raw.y) - rootY
        };
      });
      return laidOut;
    }

    function computeGlobalLayout() {
      return new Promise(function(resolve) {
        const tempContainer = document.createElement("div");
        tempContainer.style.cssText = "position:fixed;left:-10000px;top:-10000px;width:2400px;height:1500px;opacity:0;pointer-events:none;";
        document.body.appendChild(tempContainer);

        const tempNodes = new vis.DataSet(allNodes.map(nodeWithStyle));
        const tempEdges = new vis.DataSet(allEdges);
        const tempNetwork = new vis.Network(tempContainer, { nodes: tempNodes, edges: tempEdges }, sharedOptions);

        tempNetwork.once("stabilized", function() {
          const positions = tempNetwork.getPositions(allNodes.map(function(node) { return node.id; }));
          const branchPositions = applyBranchAwareLayout(positions);
          allNodes.forEach(function(node) {
            finalPositions.set(node.id, branchPositions[node.id]);
          });

          // ── Hook: force chain 2→26→27→28 to share Y with node 1, laid out horizontally ──
          (function alignChainHorizontal() {
            var anchor = finalPositions.get(1);
            if (!anchor) return;
            var anchorY = anchor.y;
            var anchorX = anchor.x;
            // Space them to the right of node 1, each ~290px apart
            var chain = [2, 26, 27, 28];
            chain.forEach(function(id, i) {
              var existing = finalPositions.get(id) || { x: 0, y: 0 };
              finalPositions.set(id, {
                x: anchorX + (i + 1) * 290,
                y: anchorY
              });
            });
          })();

          tempNetwork.destroy();
          tempContainer.remove();
          resolve();
        });

        tempNetwork.stabilize(500);
      });
    }

    network.on("click", function(params) {
      if (!params.nodes.length) return;
      revealChildren(params.nodes[0]);
    });

    network.on("doubleClick", function(params) {
      if (!params.nodes.length) fitVisible(true);
    });

    // Mobile: show pinch hint briefly on first load
    if ('ontouchstart' in window) {
      var mobileHint = document.createElement('div');
      mobileHint.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(30,46,30,0.88);color:#d4e8d4;padding:8px 18px;border-radius:16px;font:700 14px "Kalam",cursive;pointer-events:none;z-index:10;white-space:nowrap;transition:opacity 1s;';
      mobileHint.textContent = 'Pellizco para zoom · Doble tap para encuadrar';
      document.body.appendChild(mobileHint);
      setTimeout(function() { mobileHint.style.opacity = '0'; }, 3500);
      setTimeout(function() { mobileHint.remove(); }, 4600);
    }

    document.getElementById("resetButton").addEventListener("click", resetGraph);
    window.addEventListener("resize", function() { network.redraw(); });
    document.fonts.ready.then(function() {
      computeGlobalLayout().then(function() {
        resetGraph();
        document.querySelector("h1").classList.remove("hidden");
      });
    });

    document.getElementById("legendToggle").addEventListener("click", function() {
      var box = document.getElementById("legendBox");
      box.classList.toggle("open");
    });
  </script>
</body>
</html>
